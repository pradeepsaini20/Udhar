<!doctype html>
<html lang="hi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Udhar Tracker</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-50 text-gray-800">

<div class="max-w-5xl mx-auto p-4 md:p-6 grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">

  <!-- LEFT -->
  <div class="md:col-span-2">

    <header class="flex flex-col md:flex-row md:justify-between gap-3 mb-6">
      <div>
        <h1 class="text-2xl font-bold">🧾 Udhar Tracker</h1>
        <p class="text-sm text-gray-600">Dosto ke saath paiso ka hisaab yaha track karo 💸</p>
        <p class="text-xs text-gray-400 mt-1">Made by Pradeep Saini 🚀</p>
      </div>

      <div class="text-sm">
        <div>Total: <span id="total">₹0</span></div>
      </div>
    </header>

    <!-- FORM -->
    <div class="bg-white p-4 rounded shadow mb-4">
      <form id="form" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">

        <input name="name" placeholder="Naam" required class="border p-2 rounded" />
        <input name="amount" type="number" placeholder="Amount ₹" required class="border p-2 rounded" />

        <select name="type" class="border p-2 rounded">
          <option value="lent">Usne paise dene hain</option>
          <option value="borrowed">Mujhe paise dene hain</option>
        </select>

        <input name="date" type="date" class="border p-2 rounded" />

        <div class="flex gap-2">
          <button type="button" onclick="quickAdd(100)" class="bg-gray-200 px-2 rounded">+100</button>
          <button type="button" onclick="quickAdd(500)" class="bg-gray-200 px-2 rounded">+500</button>
        </div>

        <button class="bg-blue-600 text-white rounded px-3 py-2">Add</button>

      </form>
    </div>

    <!-- LIST -->
    <div id="list" class="bg-white rounded shadow"></div>

  </div>

  <!-- RIGHT CALCULATOR -->
  <div class="bg-white p-4 rounded shadow">
    <h2 class="mb-3">🧮 Calculator</h2>

    <input id="display" class="w-full border p-2 mb-2 text-right" readonly />

    <div class="grid grid-cols-4 gap-2 text-sm md:text-base">
      <button class="btn" data-val="7">7</button>
      <button class="btn" data-val="8">8</button>
      <button class="btn" data-val="9">9</button>
      <button class="btn bg-yellow-300" data-val="/">÷</button>

      <button class="btn" data-val="4">4</button>
      <button class="btn" data-val="5">5</button>
      <button class="btn" data-val="6">6</button>
      <button class="btn bg-yellow-300" data-val="*">×</button>

      <button class="btn" data-val="1">1</button>
      <button class="btn" data-val="2">2</button>
      <button class="btn" data-val="3">3</button>
      <button class="btn bg-yellow-300" data-val="-">-</button>

      <button class="btn" data-val="0">0</button>
      <button class="btn" data-val=".">.</button>
      <button id="clear" class="bg-red-300">C</button>
      <button class="btn bg-yellow-300" data-val="+">+</button>

      <button id="equal" class="col-span-4 bg-green-500 text-white">=</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
